name=vv-skater
type=ns-inject
layer=source
desc=Adds "Violet Vandal", the edition's namesake, as a selectable playable character in the Select Skater roster (master_skater_list in skater/skater_profile.qb). Built from stock CAS parts only (no model/texture injection) via her real created-skater appearance, so it ships in the open mod set. Self-contained in skater_profile.qb (appearance struct + roster entry) — no cross-file dependency, no conflict with playas-pro. She also gets a bespoke Select-Skater portrait: assets/ss_vv.img.xbx (a white full-body silhouette matching the stock pros, generated by tools/save/build_vv_portrait.py) shipped loose into Data/images/MainmenuSprites/ by the build, registered via an ss_vv line injected into menu/sprites.qb, and referenced by select_icon=ss_vv. Generated by tools/save/build_vv_skater.py via tools/save/vv_profile.py.
