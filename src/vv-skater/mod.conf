desc=Adds "Violet Vandal", the edition's namesake, as a selectable playable character in the Select Skater roster (master_skater_list in skater/skater_profile.qb). Built from stock CAS parts only (no model/texture injection) via her created-skater appearance, so it stays pure open NeverScript with no game data. Self-contained in skater_profile.qb (appearance struct + roster entry, placed after the Custom Skater slot).
