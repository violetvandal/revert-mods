name=Silence Phone (toggle)
type=ns-inject
layer=source
desc=Stops the in-game story pager/phone text messages at the source: chapter_info.qb's SendPagerMessageWithDelay now gates Skater:SendPagerMessage behind `if ! GetGlobalFlag flag=MOD_SILENCE_PHONE`, so when the flag is set the per-points story texts never fire (no popup, no flash, no buzz). TOGGLE via MOD OPTIONS -> "Silence Phone:" (GlobalFlag MOD_SILENCE_PHONE=511, defined in global_flags.qb by the mod-options-menu mod; menu item added by the mainmenu-mod mod). Flag persists per career; default Off (texts on) until toggled On. Unblocked by the byte-perfect NeverScript compiler (chapter_info.qb now round-trips byte-identical and survives modification; pager_menu.qb does NOT, so the display chokepoint was dead). Injected COMPRESSED into qb_scripts.prx (apply-mods uses replacez there for the load-size ceiling). NOTE: this mod's gate depends on flag 511 being defined by mod-options-menu and the menu item by mainmenu-mod -- keep all three enabled together.
